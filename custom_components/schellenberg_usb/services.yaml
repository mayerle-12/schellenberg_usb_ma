# Services for Schellenberg USB integration

pair:
  name: Pair device
  description: Activate pairing mode on the Schellenberg USB stick to pair a new blind motor. After calling this service, press the pairing button on your blind motor within 10 seconds.

test_command:
  name: Test blind command
  description: Send a raw open, close, or stop command to a device enum without creating a cover.
  fields:
    device_id:
      name: Device ID
      description: Six-character device ID used for logging and diagnosis.
      required: true
      example: "F2B8D5"
      selector:
        text:
    enum:
      name: Enum
      description: Two-character enum inserted into the outgoing serial payload.
      required: true
      example: "23"
      selector:
        text:
    command:
      name: Command
      required: true
      selector:
        select:
          options:
            - open
            - close
            - stop
    config_entry_id:
      name: Config entry ID
      description: Required only when more than one Schellenberg USB hub is loaded.
      required: false
      selector:
        text:
